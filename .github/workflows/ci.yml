name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install flake8

      - name: Lint with flake8
        run: |
          # fail on real errors (syntax, undefined names); warn on style
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
          flake8 . --count --exit-zero --max-line-length=120 --statistics

      - name: Verify the app imports and builds
        env:
          GROQ_API_KEY: "ci-placeholder-key"
        run: |
          python -c "import app; print('app.py imports cleanly')"

      - name: Smoke test — Flask app starts and serves a route
        env:
          GROQ_API_KEY: "ci-placeholder-key"
        run: |
          python - <<'PY'
          import app
          client = app.app.test_client()
          resp = client.get("/")
          assert resp.status_code == 200, f"Home route returned {resp.status_code}"
          print("Smoke test passed: / returned 200")
          PY
